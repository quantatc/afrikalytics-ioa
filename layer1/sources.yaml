# IOA Intelligence Briefing — Source Registry
# Layer 1: Collection Configuration
#
# Fields:
#   name          — display name
#   url           — homepage / index page
#   rss_url       — RSS/Atom feed URL (null if scraper only)
#   type          — rss | scraper | rss+scraper
#   source_tier   — pan-africa | country-specific
#   region        — pan-africa | southern-africa | north-africa | east-africa |
#                   west-africa | central-africa | south-africa (ZA only)
#   countries     — ISO 3166-1 alpha-2 list. Empty = all Africa. Used for
#                   auto-tagging when LLM country detection is ambiguous.
#   sectors       — list of sectors this source covers
#   active        — true | false  (set false to pause without deleting)
#   notes         — scraper hints, paywall status, dedup warnings etc.

# ════════════════════════════════════════════════════════════════════════════
# TIER 1 — PAN-AFRICA SOURCES (the original 30)
# ════════════════════════════════════════════════════════════════════════════



































# ════════════════════════════════════════════════════════════════════════════
# TIER 2 — COUNTRY-SPECIFIC SOURCES
# Add new country sources here as Zahra's team provides them.
#
# Key difference from Tier 1:
#   - countries field is REQUIRED (at least one ISO code)
#   - source_tier must be "country-specific"
#   - The collector uses this to hard-tag articles at ingestion time,
#     bypassing the need for LLM country detection on obvious sources
#     (e.g. a Nigeria-only newspaper doesn't need AI to confirm it's NG)
#   - This saves Haiku tokens in Layer 2 — country is pre-filled, AI only
#     needs to classify sector + relevance
# ════════════════════════════════════════════════════════════════════════════

